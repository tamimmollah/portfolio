<style>

/* =========================
ULTRA PREMIUM ANIMATION
========================= */

.loader{
position:fixed;
inset:0;
background:#050816;
display:flex;
justify-content:center;
align-items:center;
z-index:999999;
overflow:hidden;
}

.loader:before{
content:'';
position:absolute;
width:500px;
height:500px;
background:linear-gradient(
135deg,
#3a86ff,
#8338ec
);
filter:blur(120px);
opacity:.3;
animation:loaderGlow 3s infinite;
}

.loader-text{
font-size:72px;
font-weight:800;
letter-spacing:-3px;
background:linear-gradient(
to right,
#ffffff,
#3a86ff,
#8338ec
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
position:relative;
animation:
loaderZoom 2s ease infinite,
loaderFloat 4s ease-in-out infinite;
}

@keyframes loaderGlow{

0%,100%{
transform:scale(1);
opacity:.25;
}

50%{
transform:scale(1.2);
opacity:.45;
}

}

@keyframes loaderZoom{

0%,100%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

}

@keyframes loaderFloat{

0%,100%{
transform:translateY(0px);
}

50%{
transform:translateY(-10px);
}

}

/* HERO TITLE ANIMATION */

.hero-title{
animation:heroFade 1.5s ease forwards;
opacity:0;
transform:translateY(80px);
}

@keyframes heroFade{

to{
opacity:1;
transform:translateY(0px);
}

}

/* GRADIENT ANIMATION */

.gradient{
background-size:300% 300%;
animation:gradientMove 6s ease infinite;
}

@keyframes gradientMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* HERO IMAGE FLOAT */

.hero-box{
animation:heroImageFloat 6s ease-in-out infinite;
}

@keyframes heroImageFloat{

0%,100%{
transform:translateY(0px);
}

50%{
transform:translateY(-18px);
}

}

/* BUTTON ANIMATION */

.btn{
position:relative;
overflow:hidden;
}

.btn:before{
content:'';
position:absolute;
top:0;
left:-120%;
width:120%;
height:100%;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.25),
transparent
);
transition:.7s;
}

.btn:hover:before{
left:120%;
}

.btn:hover{
transform:
translateY(-10px)
scale(1.03);
}

/* GLASS CARD ANIMATION */

.glass,
.timeline-box,
.contact-box{
transition:
transform .5s ease,
border .5s ease,
box-shadow .5s ease;
}

.glass:hover,
.timeline-box:hover,
.contact-box:hover{

transform:
translateY(-12px)
scale(1.01);

border-color:#3a86ff;

box-shadow:
0 20px 40px rgba(58,134,255,.15);

}

/* PORTFOLIO CARD */

.portfolio{
transition:.5s;
}

.portfolio:hover{
transform:scale(1.02);
box-shadow:
0 25px 60px rgba(58,134,255,.18);
}

/* NAVBAR SCROLL EFFECT */

nav{
transition:
background .5s ease,
padding .5s ease,
transform .5s ease;
}

nav.scrolled{
background:rgba(5,8,22,.85);
backdrop-filter:blur(25px);
padding:14px 22px;
}

/* FLOATING CARDS */

.float-card{
animation:
floatCard 5s ease-in-out infinite;
}

@keyframes floatCard{

0%,100%{
transform:translateY(0px);
}

50%{
transform:translateY(-15px);
}

}

/* SKILLS HOVER */

.skill{
transition:
transform .4s ease,
background .4s ease;
}

.skill:hover{
transform:
translateY(-8px)
scale(1.05);

background:
linear-gradient(
135deg,
#3a86ff,
#8338ec
);
}

/* FOOTER ANIMATION */

footer{
position:relative;
overflow:hidden;
}

footer:before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:1px;
background:linear-gradient(
90deg,
transparent,
#3a86ff,
transparent
);
animation:footerLine 4s linear infinite;
}

@keyframes footerLine{

100%{
left:100%;
}

}

/* MOBILE */

@media(max-width:768px){

.loader-text{
font-size:42px;
text-align:center;
padding:0 20px;
}

.hero-title{
font-size:48px !important;
line-height:1.15;
}

}

</style>

<script>

/* LOADER */

window.addEventListener("load",()=>{

gsap.to(".loader",{

opacity:0,
duration:1.2,
delay:2,

onComplete:()=>{

document.querySelector(".loader").style.display="none";

}

});

});

/* NAVBAR SCROLL */

window.addEventListener("scroll",()=>{

const nav=document.querySelector("nav");

if(window.scrollY>50){

nav.classList.add("scrolled");

}else{

nav.classList.remove("scrolled");

}

});

/* HERO ANIMATION */

gsap.from(".hero-title",{

y:120,
opacity:0,
duration:1.4,
ease:"power4.out"

});

gsap.from(".hero-description",{

y:80,
opacity:0,
duration:1.4,
delay:.3,
ease:"power4.out"

});

gsap.from(".btn",{

y:50,
opacity:0,
duration:1,
delay:.6,
stagger:.2,
ease:"power4.out"

});

/* IMAGE ANIMATION */

gsap.from(".hero-box",{

scale:.8,
opacity:0,
duration:1.5,
delay:.5,
ease:"power4.out"

});

/* SECTION ANIMATION */

gsap.utils.toArray(

".glass,.timeline-box,.portfolio,.contact-box"

).forEach((el)=>{

gsap.from(el,{

scrollTrigger:{
trigger:el,
start:"top 85%"
},

y:100,
opacity:0,
scale:.9,
duration:1.3,
ease:"power4.out"

});

});

/* SKILL STAGGER */

gsap.from(".skill",{

scrollTrigger:{
trigger:".skills",
start:"top 85%"
},

y:40,
opacity:0,
duration:.8,
stagger:.08

});

</script>
