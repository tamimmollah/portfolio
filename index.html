<style>

/* =========================
PREMIUM IMAGE + ANIMATION FIX
========================= */

/* HERO IMAGE */

.hero-image-wrap{
position:relative;
display:flex;
justify-content:center;
align-items:center;
perspective:1200px;
}

.hero-glow{
position:absolute;
width:320px;
height:320px;
border-radius:50%;
background:linear-gradient(135deg,#3a86ff,#8338ec);
filter:blur(90px);
opacity:.18;
animation:heroGlow 6s ease-in-out infinite;
}

@keyframes heroGlow{

50%{
transform:scale(1.08);
opacity:.25;
}

}

.hero-image{

width:360px;
height:500px;

border-radius:34px;

overflow:hidden;

position:relative;

background:rgba(255,255,255,.04);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(16px);

box-shadow:
0 20px 60px rgba(0,0,0,.35);

animation:heroFloat 6s ease-in-out infinite;

transition:
transform .8s ease,
box-shadow .8s ease;

}

.hero-image:hover{

transform:
translateY(-12px)
rotateY(4deg)
scale(1.02);

box-shadow:
0 30px 70px rgba(58,134,255,.18);

}

.hero-image::before{

content:'';

position:absolute;
inset:0;

background:
linear-gradient(
to top,
rgba(5,8,22,.45),
transparent
);

z-index:2;

}

.hero-image img{

width:100%;
height:100%;

object-fit:cover;
object-position:center top;

transition:
transform 1.4s ease,
filter .8s ease;

}

.hero-image:hover img{

transform:scale(1.06);

filter:
contrast(1.05)
brightness(1.03);

}

@keyframes heroFloat{

0%,100%{
transform:translateY(0px);
}

50%{
transform:translateY(-18px);
}

}

/* PORTFOLIO GRID */

.portfolio-grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:28px;

align-items:stretch;

}

/* PROJECT CARD */

.project{

position:relative;

min-height:520px;

border-radius:34px;

overflow:hidden;

background:rgba(255,255,255,.04);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(16px);

transition:
transform .8s ease,
border .8s ease,
box-shadow .8s ease;

transform-style:preserve-3d;

}

.project:hover{

transform:
translateY(-14px)
scale(1.015);

border-color:#3a86ff;

box-shadow:
0 25px 70px rgba(58,134,255,.16);

}

/* IMAGE */

.project img{

position:absolute;
inset:0;

width:100%;
height:100%;

object-fit:cover;
object-position:top center;

transition:
transform 1.5s ease,
filter .8s ease;

}

.project:hover img{

transform:scale(1.08);

filter:
brightness(.5)
blur(.5px);

}

/* OVERLAY */

.project-overlay{

position:absolute;
inset:0;

background:
linear-gradient(
to top,
rgba(5,8,22,.98) 10%,
rgba(5,8,22,.78) 45%,
rgba(5,8,22,.15) 100%
);

display:flex;
align-items:flex-end;

padding:34px;

}

/* CONTENT */

.project-content{

position:relative;
z-index:3;

transform:translateY(40px);

opacity:0;

transition:
transform .9s ease,
opacity .9s ease;

}

.project:hover .project-content{

transform:translateY(0px);

opacity:1;

}

/* TAG */

.project-tag{

display:inline-flex;
align-items:center;

padding:10px 18px;

border-radius:50px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(12px);

font-size:12px;

margin-bottom:18px;

color:white;

}

/* TITLE */

.project-content h2{

font-size:34px;

line-height:1.1;

margin-bottom:14px;

font-weight:700;

text-shadow:
0 4px 20px rgba(0,0,0,.4);

}

/* DESCRIPTION */

.project-content p{

font-size:14px;

line-height:1.9;

color:#dbe4f0;

max-width:500px;

text-shadow:
0 4px 14px rgba(0,0,0,.5);

}

/* BUTTONS */

.project-buttons{

display:flex;

gap:14px;

margin-top:24px;

flex-wrap:wrap;

}

.project-btn{

padding:14px 22px;

border-radius:16px;

background:
linear-gradient(
135deg,
#3a86ff,
#8338ec
);

display:flex;
align-items:center;
gap:10px;

font-size:13px;
font-weight:600;

color:white;

transition:
transform .5s ease,
box-shadow .5s ease;

}

.project-btn:hover{

transform:
translateY(-6px)
scale(1.03);

box-shadow:
0 14px 30px rgba(58,134,255,.25);

}

/* MOBILE */

@media(max-width:768px){

.hero-image{

width:100%;
max-width:320px;

height:420px;

border-radius:28px;

}

.hero-glow{

width:250px;
height:250px;

}

.portfolio-grid{

grid-template-columns:1fr;

gap:22px;

}

.project{

min-height:420px;

border-radius:26px;

transform:none !important;

}

.project img{

transform:none !important;

filter:none !important;

transition:.6s ease;

}

.project:hover img{

transform:scale(1.04) !important;

filter:brightness(.65);

}

.project-overlay{

padding:24px;

background:
linear-gradient(
to top,
rgba(5,8,22,.98),
rgba(5,8,22,.72),
rgba(5,8,22,.2)
);

}

.project-content{

opacity:1 !important;

transform:none !important;

}

.project-content h2{

font-size:26px;

}

.project-content p{

font-size:13px;

line-height:1.8;

}

.project-buttons{

flex-direction:column;

}

.project-btn{

justify-content:center;

}

}

/* SMOOTH REVEAL */

.reveal{
opacity:0;
transform:translateY(70px);
transition:1.2s ease;
}

.reveal.active{
opacity:1;
transform:translateY(0px);
}

</style>

<script>

/* =========================
ULTRA PREMIUM ANIMATION
========================= */

gsap.registerPlugin(ScrollTrigger);

/* HERO */

gsap.from(".hero-badge",{
y:40,
opacity:0,
duration:1,
ease:"power4.out"
});

gsap.from(".hero-title",{
y:100,
opacity:0,
duration:1.4,
delay:.2,
ease:"power4.out"
});

gsap.from(".hero-description",{
y:80,
opacity:0,
duration:1.2,
delay:.4,
ease:"power4.out"
});

gsap.from(".btn",{
y:50,
opacity:0,
duration:1,
delay:.7,
stagger:.15,
ease:"power4.out"
});

gsap.from(".stat-box",{
y:60,
opacity:0,
duration:1,
delay:1,
stagger:.2,
ease:"power4.out"
});

gsap.from(".hero-image",{
scale:.8,
opacity:0,
rotate:4,
duration:1.8,
delay:.4,
ease:"expo.out"
});

/* SECTIONS */

gsap.utils.toArray(".glass,.timeline-box,.project,.contact-box").forEach((el)=>{

gsap.from(el,{

scrollTrigger:{
trigger:el,
start:"top 88%"
},

y:90,
opacity:0,
duration:1.3,
ease:"power4.out"

});

});

/* PORTFOLIO PARALLAX */

document.querySelectorAll(".project").forEach(card=>{

card.addEventListener("mousemove",(e)=>{

if(window.innerWidth < 768) return;

const rect=card.getBoundingClientRect();

const x=e.clientX-rect.left;
const y=e.clientY-rect.top;

const moveX=(x-rect.width/2)/28;
const moveY=(y-rect.height/2)/28;

card.style.transform=`

translateY(-14px)

rotateX(${-moveY}deg)

rotateY(${moveX}deg)

scale(1.015)

`;

});

card.addEventListener("mouseleave",()=>{

card.style.transform="";

});

});

</script>
